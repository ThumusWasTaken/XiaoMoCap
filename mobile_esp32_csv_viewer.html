<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 CSV Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 10px;
      max-width: 100%;
      overflow-x: hidden;
    }
    textarea {
      width: 100%;
      height: 300px;
      margin-top: 20px;
      font-family: monospace;
      white-space: pre;
      box-sizing: border-box;
      font-size: 12px;
      resize: vertical;
    }
    button {
      margin-right: 5px;
      margin-bottom: 10px;
      padding: 12px 8px;
      font-size: 14px;
      min-width: 70px;
      border: none;
      border-radius: 4px;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    .form-section {
      margin-bottom: 15px;
      padding: 12px;
      background: #f4f4f4;
      border-radius: 8px;
    }
    input[type="number"] {
      padding: 8px;
      width: 80px;
      margin-right: 8px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    #formResponse {
      margin-top: 10px;
      font-weight: bold;
      color: green;
      font-size: 14px;
    }
    .checkbox-section {
      margin-bottom: 15px;
      padding: 12px;
      background: #f9f9f9;
      border-radius: 8px;
      border-left: 4px solid #4CAF50;
    }
    .checkbox-item {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
    }
    .checkbox-item input[type="checkbox"] {
      margin-right: 10px;
      transform: scale(1.3);
    }
    .checkbox-item label {
      cursor: pointer;
      font-size: 16px;
    }
    h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }
    h3 {
      font-size: 16px;
      margin-bottom: 10px;
    }
    p {
      font-size: 14px;
    }
    
    /* Mobile-specific styles */
    @media (max-width: 768px) {
      body {
        margin: 5px;
      }
      textarea {
        height: 250px;
        font-size: 11px;
      }
      button {
        padding: 14px 10px;
        font-size: 13px;
        margin-right: 3px;
      }
      .form-section, .checkbox-section {
        padding: 10px;
      }
      input[type="number"] {
        width: 70px;
        margin-right: 5px;
      }
      .checkbox-item label {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <h2>ESP32 CSV Viewer + Logging Config</h2>
  <p>Connect to Wi-Fi: <strong>ESP32-DataServer</strong></p>

  <div class="form-section">
    <h3>Configure Logging</h3>
    <form id="configForm">
      <label for="duration">Duration (s):</label>
      <input type="number" id="duration" name="duration" min="1" max="600" required>

      <label for="rate">Rate (Hz):</label>
      <input type="number" id="rate" name="rate" min="1" max="100" required>

      <button type="submit">📤 Send Config</button>
    </form>
    <div id="formResponse"></div>
  </div>

  <div class="checkbox-section">
    <h3>Which sensor are you using?</h3>
    <div class="checkbox-item">
      <input type="checkbox" id="accelerometer" name="accelerometer">
      <label for="accelerometer">Accelerometer</label>
    </div>
    <div class="checkbox-item">
      <input type="checkbox" id="gyroscope" name="gyroscope">
      <label for="gyroscope">Gyroscope</label>
    </div>
    <div class="checkbox-item">
      <input type="checkbox" id="magnetometer" name="magnetometer">
      <label for="magnetometer">Magnetometer</label>
    </div>
  </div>

  <button onclick="startFetching()">▶ Connect</button>
  <button onclick="stopFetching()">⏹ Stop</button>
  <button onclick="downloadCSV()">⬇ Download CSV</button>
  <button onclick="clearAll()" style="background-color: #ff6b6b; color: white;">🗑 Clear All</button>

  <textarea id="csvDisplay" readonly>Not connected...</textarea>

  <script>
    const ESP32_URL = "http://192.168.1.100";
    let fetchInterval = null;
    let latestCSV = "";
    let displayedLines = new Set();
    let isConnected = false;
    let lastDataReceived = "";

    // Submit logging config
    document.getElementById("configForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const duration = document.getElementById("duration").value;
      const rate = document.getElementById("rate").value;
      
      // Get checkbox values
      const accelerometer = document.getElementById("accelerometer").checked;
      const gyroscope = document.getElementById("gyroscope").checked;
      const magnetometer = document.getElementById("magnetometer").checked;
      
      // If no checkboxes are selected, set all to true
      const noSelection = !accelerometer && !gyroscope && !magnetometer;
      const accel = noSelection ? true : accelerometer;
      const gyro = noSelection ? true : gyroscope;
      const mag = noSelection ? true : magnetometer;

      const url = `${ESP32_URL}/send?duration=${duration}&rate=${rate}&accelerometer=${accel}&gyroscope=${gyro}&magnetometer=${mag}`;
      
      // Show what's being sent in the response
      document.getElementById("formResponse").textContent = 
        `✅ Config sent: Duration=${duration}s, Rate=${rate}Hz, Accel=${accel}, Gyro=${gyro}, Mag=${mag}`;
      
      fetch(url)
        .then(res => res.text())
        // .then(data => {
        //   // You can add additional response handling here if needed
        //   console.log("ESP32 response:", data);
        // })
        // .catch(err => {
        //   document.getElementById("formResponse").textContent = "❌ Error: " + err;
        // });
    });

    async function fetchData() {
      // If we're not connected anymore, don't fetch
      if (!isConnected) return;

      try {
        const response = await fetch(`${ESP32_URL}/data`);
        if (!response.ok) throw new Error("Network response was not ok");

        const newData = await response.text();
        latestCSV = newData;

        const textarea = document.getElementById("csvDisplay");
        
        // Check if we received new data
        if (newData === lastDataReceived) {
          // No new data, show waiting message
          if (!textarea.value.includes("⏳ Waiting for more data...")) {
            textarea.value += "\n⏳ Waiting for more data...";
            textarea.scrollTop = textarea.scrollHeight;
          }
        } else {
          // New data received, remove waiting message if present
          if (textarea.value.includes("⏳ Waiting for more data...")) {
            textarea.value = textarea.value.replace(/\n⏳ Waiting for more data\.\.\./g, "");
          }
          
          const lines = newData.trim().split("\n");
          for (const line of lines) {
            if (!displayedLines.has(line) && line.trim() !== "") {
              textarea.value += (textarea.value.endsWith("\n") ? "" : "\n") + line;
              displayedLines.add(line);
            }
          }
          textarea.scrollTop = textarea.scrollHeight;
          lastDataReceived = newData;
        }
      } catch (err) {
        if (isConnected) {
          document.getElementById("csvDisplay").value += "\nscanning - check wifi is connected\n";
          //console.error("Fetch error:", err);
        }
      }
    }

    function startFetching() {
      if (fetchInterval) return;
      isConnected = true;
      document.getElementById("csvDisplay").value = "🔄 Connecting...\n";
      displayedLines.clear();
      lastDataReceived = "";
      fetchData();
      fetchInterval = setInterval(fetchData, 5000);
    }

    function stopFetching() {
      if (fetchInterval) {
        clearInterval(fetchInterval);
        fetchInterval = null;
      }
      isConnected = false;
      
      // Remove any waiting message
      const textarea = document.getElementById("csvDisplay");
      if (textarea.value.includes("⏳ Waiting for more data...")) {
        textarea.value = textarea.value.replace(/\n⏳ Waiting for more data\.\.\./g, "");
      }
      
      // Add stopped message
      textarea.value += "\n⏹ Stopped receiving data.";
      textarea.scrollTop = textarea.scrollHeight;
    }

    function downloadCSV() {
      if (!latestCSV) return alert("No data to download.");
      const blob = new Blob([latestCSV], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "esp32_data.txt";
      a.click();
      URL.revokeObjectURL(url);
    }

    // Handle checkbox changes
    document.getElementById("accelerometer").addEventListener("change", function() {
      console.log("Accelerometer:", this.checked);
    });

    document.getElementById("gyroscope").addEventListener("change", function() {
      console.log("Gyroscope:", this.checked);
    });

    document.getElementById("magnetometer").addEventListener("change", function() {
      console.log("Magnetometer:", this.checked);
    });

    // Clear all function
    function clearAll() {
      // Stop fetching if active
      stopFetching();
      
      // Clear all form fields
      document.getElementById("duration").value = "";
      document.getElementById("rate").value = "";
      
      // Uncheck all sensor checkboxes
      document.getElementById("accelerometer").checked = false;
      document.getElementById("gyroscope").checked = false;
      document.getElementById("magnetometer").checked = false;
      
      // Clear all response messages
      document.getElementById("formResponse").textContent = "";
      
      // Clear CSV display
      document.getElementById("csvDisplay").value = "Not connected...";
      
      // Reset internal variables
      latestCSV = "";
      displayedLines.clear();
      lastDataReceived = "";
      
      console.log("All fields and data cleared");
    }
  </script>
</body>
</html>
