<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TOL CSV Viewer + setup</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; max-width: 100%; }
    h2 { margin-bottom: 6px; }
    textarea { width: 100%; height: 300px; font-family: monospace; white-space: pre; box-sizing: border-box; font-size: 12px; resize: vertical; padding: 8px; }
    .controls { margin: 10px 0; display:flex; gap:8px; flex-wrap:wrap; }
    input[type="text"] { padding:8px; min-width:180px; }
    button { padding:10px 14px; border-radius:6px; border:none; background:#2b8a3e; color:white; cursor:pointer; }
    button.stop { background:#c0392b; }
    button.download { background:#007bff; }
    #status { margin-top:8px; font-family: monospace; color:#333; }
    .small { font-size:13px; color:#666; }
    .note { margin-top:8px; color:#777; font-size:13px; }
    @media (max-width: 768px) {
      body {margin: 5px;}
      textarea {height: 250px; font-size: 11px;}
      button {padding: 14px 10px; font-size: 13px; margin-right: 3px;}
      .form-section, .checkbox-section {padding: 10px;}
      input[type="number"] {width: 70px; margin-right: 5px;}
      .checkbox-item label {font-size: 15px;}
    }
  </style>
</head>
<body>
  <h2>TOL CSV Fetcher (curl-like) </h2>
  <div class="note">
    Connect to Wi-Fi: TOL-00x. Your ESP32 `/data` handler sends <code>Access-Control-Allow-Origin: *</code>.
  </div>

  <div class="form-section">
    <h3>Configure Logging</h3>
    <form id="configForm">
      <label for="duration">Duration (s):</label>
      <input type="number" id="duration" min="1" max="54000" required>

      <label for="rate">Rate (Hz):</label>
      <input type="number" id="rate" min="1" max="100" required>

      <button type="submit">📤 Send Config</button>
    </form>
    <div id="formResponse"></div>
  </div>

  <div class="checkbox-section">
    <h3>Which sensor are you using?</h3>
    <div class="checkbox-item">
      <input type="checkbox" id="accelerometer">
      <label for="accelerometer">Accelerometer</label>
    </div>
    <div class="checkbox-item">
      <input type="checkbox" id="gyroscope">
      <label for="gyroscope">Gyroscope</label>
    </div>
    <div class="checkbox-item">
      <input type="checkbox" id="magnetometer">
      <label for="magnetometer">Magnetometer</label>
    </div>
  </div>

  <div class="controls">
    <label>File name: <input id="csvFileName" type="text" placeholder="my_log"></label>
    <button id="connectBtn">▶ Connect & Download</button>
    <button id="stopBtn" class="stop">⏹ Stop</button>
    <button id="downloadBtn" class="download">⬇ Save Latest</button>
  </div>

  <div id="status">Status: idle</div>
  <div id="stats" class="small"></div>
  <textarea id="csvDisplay" readonly>Not connected...</textarea>

  <script>
    const ESP32_URL = "http://192.168.1.100";
    const connectBtn = document.getElementById('connectBtn');
    const stopBtn = document.getElementById('stopBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const csvDisplay = document.getElementById('csvDisplay');
    const statusEl = document.getElementById('status');
    const statsEl = document.getElementById('stats');
    const fileNameInput = document.getElementById('csvFileName');

    let controller = null;              // AbortController for the fetch
    let accumulatedCSV = "";           // full text assembled as it arrives
    let startTimeMs = 0;
    let receivedBytes = 0;
    let lastUpdateTime = 0;

    const durationInput = document.getElementById("duration");
    const rateInput = document.getElementById("rate");
    const formResponse = document.getElementById("formResponse");

    document.getElementById("configForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const duration = durationInput.value;
      const rate = rateInput.value;
      const accel = document.getElementById("accelerometer").checked;
      const gyro = document.getElementById("gyroscope").checked;
      const mag = document.getElementById("magnetometer").checked;

      const noSelection = !accel && !gyro && !mag;
      const params = new URLSearchParams({
        duration,
        rate,
        accelerometer: noSelection || accel,
        gyroscope: noSelection || gyro,
        magnetometer: noSelection || mag
      });

      const url = `${ESP32_URL}/send?${params.toString()}`;
      formResponse.textContent = `✅ Config sent: Duration=${duration}s, Rate=${rate}Hz, Accel=${params.get("accelerometer")}, Gyro=${params.get("gyroscope")}, Mag=${params.get("magnetometer")}`;
      fetch(url).catch(err => {
        //formResponse.textContent = "❌ Error: " + err;
      });
    });

    function humanBytes(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + " KB";
      return (bytes/1024/1024).toFixed(2) + " MB";
    }

    function getFileName() {
      const user = fileNameInput.value.trim();
      if (user) {
        return (user.endsWith(".csv") ? user : user + ".csv");
      }
      const ts = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
      return `esp32_log_${ts}.csv`;
    }

    function updateStatus(text) {
      statusEl.textContent = "Status: " + text;
    }

    function updateStats(received, total, startedAtMs) {
      const elapsed = Math.max(1, (Date.now() - startedAtMs)) / 1000.0; // seconds
      const speedKB = (received / 1024) / elapsed;
      if (total) {
        const pct = ((received / total) * 100).toFixed(1);
        const etaSec = Math.max(0, Math.round(((total - received) / (received / elapsed)) || 0));
        statsEl.textContent = `${pct}%  ${humanBytes(received)} / ${humanBytes(total)}  |  ${speedKB.toFixed(1)} KB/s  |  ETA ${etaSec}s`;
      } else {
        statsEl.textContent = `${humanBytes(received)} received  |  ${speedKB.toFixed(1)} KB/s`;
      }
    }

    async function startFetching() {
      if (controller) {
        console.warn("Already running");
        return;
      }
      // reset
      accumulatedCSV = "";
      csvDisplay.value = "";
      receivedBytes = 0;
      startTimeMs = Date.now();
      lastUpdateTime = 0;
      controller = new AbortController();
      updateStatus("Connecting...");
      statsEl.textContent = "";

      try {
        const response = await fetch(`${ESP32_URL}/data`, { signal: controller.signal, method: 'GET' });
        if (!response.ok) throw new Error("Server returned " + response.status);

        // If server doesn't send CORS header, fetch will fail with "Failed to fetch".
        // If you see that, ensure your ESP32 adds: server.sendHeader("Access-Control-Allow-Origin", "*");
        const contentLengthHeader = response.headers.get('Content-Length');
        const totalBytes = contentLengthHeader ? parseInt(contentLengthHeader) : null;

        // If body is not readable stream, fallback to text()
        if (!response.body) {
          const txt = await response.text();
          accumulatedCSV = txt;
          csvDisplay.value = txt;
          updateStatus("Completed (no streaming)");
          updateStats(txt.length, totalBytes, startTimeMs);
          controller = null;
          return;
        }

        updateStatus("Downloading...");
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          // value is a Uint8Array chunk
          receivedBytes += value.length;
          const chunkText = decoder.decode(value, { stream: true });
          accumulatedCSV += chunkText;
          csvDisplay.value += chunkText;

          // optional auto-scroll
          csvDisplay.scrollTop = csvDisplay.scrollHeight;

          // update stats every 250ms or so
          const now = Date.now();
          if (now - lastUpdateTime > 200) {
            updateStats(receivedBytes, totalBytes, startTimeMs);
            lastUpdateTime = now;
          }

          // allow event loop (not strictly necessary in modern browsers)
          await new Promise(res => setTimeout(res, 0));
        }

        // finalize decoding
        const tail = new TextDecoder().decode();
        if (tail) {
          accumulatedCSV += tail;
          csvDisplay.value += tail;
        }

        // final stats
        updateStats(receivedBytes, totalBytes, startTimeMs);
        updateStatus("Completed");

        // auto-save now that transfer finished
        const filename = getFileName();
        saveBlob(accumulatedCSV, filename);

      } catch (err) {
        if (err.name === 'AbortError') {
          updateStatus("Aborted by user");
          statsEl.textContent = `Received ${humanBytes(receivedBytes)} before abort`;
        } else {
          console.error(err);
          updateStatus("Failed to fetch — see console");
          statsEl.textContent = "Error: " + (err.message || err);
          alert("Fetch failed. Common causes:\n- Not connected to ESP32 AP\n- ESP32 did not send CORS header (Access-Control-Allow-Origin: *)\n- Wrong IP\nCheck browser console for details.");
        }
      } finally {
        controller = null;
      }
    }

    function stopFetching() {
      if (controller) {
        controller.abort();
        controller = null;
      } else {
        updateStatus("Not currently downloading");
      }
    }

    function saveBlob(text, filename) {
      const blob = new Blob([text], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      updateStatus("Saved " + filename);
    }

    function downloadCSV() {
      if (!accumulatedCSV) return alert("No data downloaded yet");
      saveBlob(accumulatedCSV, getFileName());
    }

    // Wire buttons
    connectBtn.addEventListener('click', () => startFetching());
    stopBtn.addEventListener('click', () => stopFetching());
    downloadBtn.addEventListener('click', () => downloadCSV());

  </script>
</body>
</html>
